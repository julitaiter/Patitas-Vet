{% extends "base.html" %}

{% block title %}Carrito | Patitas Vet{% endblock %}

{% block content %}
<section class="container my-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="mb-1">Carrito</h1>
            <p class="text-muted mb-0">Revisá los productos que elegiste.</p>
        </div>
        <a href="{% url 'listar_catalogo' %}" class="btn btn-outline-success">Seguir comprando</a>
    </div>

    <div id="cart-feedback" aria-live="polite"></div>
    <div id="cart-page">
        <noscript>
            <div class="alert alert-warning">Necesitás activar JavaScript para ver y editar el carrito.</div>
        </noscript>
    </div>
</section>
{% endblock %}
