{% extends 'base.html' %}

{% block title %}Eliminar ítem | Patitas Vet{% endblock %}

{% block content %}

<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h4 mb-3">Eliminar {{ obj.nombre }}</h1>

                    <p class="text-muted">
                        ¿Seguro que querés eliminar este ítem? Esta acción no se puede deshacer.
                    </p>

                    <form method="post">
                        {% csrf_token %}

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">
                                Sí, eliminar
                            </button>

                            <a href="{% url 'listar_catalogo' %}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

{% endblock %}
